run_name: policy_decay_combined_7k
owner: TBD
seed: 1

dataset:
  name: HuggingFaceFW/fineweb
  config_name: sample-100BT
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_from_train: true
  validation_stream_offset: 50000
  shuffle_buffer_size: 10000
  max_validation_samples: 5000

model:
  name: llama_intermediate_512x8
  context_length: 1024
  hidden_size: 512
  intermediate_size: 2048
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8

training:
  max_steps: 7000
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 64
  learning_rate: 6.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 5
  eval_interval_steps: 50
  save_interval_steps: 1000
  max_eval_batches: 25
  notes: "policy decay — combined (loss_variance_low AND grad_snr_low) trigger from step 4900, decay_length=700, final_lr_ratio=0.25. Thresholds: calibrate from p10 of steps 6000-7000 on wsd_intermediate_10k logs."
  policy_decay:
    enabled: true
    policy: combined
    earliest_trigger_step: 4900
    decay_length: 700
    final_lr_ratio: 0.25
    decay_type: inverse_proportional
    val_loss_gate: TBD   # replace with p10 val_loss at step ~6000 from wsd_intermediate_10k logs
    loss_variance_threshold: TBD  # replace with p10 loss_variance between steps 6000-7000
    grad_snr_threshold: TBD  # replace with p10 grad_snr between steps 6000-7000

schedule:
  type: warmup_stable
  warmup_steps: 100
