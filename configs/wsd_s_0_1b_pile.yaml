run_name: wsd_s_0_1b_pile_50b
owner: TBD
seed: 1

dataset:
  name: EleutherAI/pile
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_split_name: validation
  shuffle_buffer_size: 10000
  max_validation_samples: 10000

model:
  name: llama_0_1B
  context_length: 4096
  hidden_size: 768
  intermediate_size: 3072
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 12

training:
  max_steps: 12500
  batch_size: 1
  eval_batch_size: 1
  gradient_accumulation_steps: 1024
  learning_rate: 6.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 10
  eval_interval_steps: 500
  save_interval_steps: 1250
  max_eval_batches: 50
  notes: 0.1B LLaMA WSD-S 50B-token baseline on The Pile

schedule:
  type: wsd_s
  warmup_steps: 2000
  decay_type: inverse_proportional
  final_lr_ratio: 0.1
  decays:
    - start_step: 11250
      end_step: 12500
