run_name: cosine_0_1b_fineweb_2_6b
owner: TBD
seed: 1
dataset:
  name: HuggingFaceFW/fineweb
  config_name: sample-100BT
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_from_train: true
  validation_stream_offset: 100000
  shuffle_buffer_size: 10000
  max_validation_samples: 10000
model:
  name: llama_0_1B
  context_length: 2048
  hidden_size: 768
  intermediate_size: 3072
  num_hidden_layers: 12
  num_attention_heads: 12
  num_key_value_heads: 12
training:
  max_steps: 1250
  batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 256
  learning_rate: 0.0006
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 10
  eval_interval_steps: 100
  save_interval_steps: 250
  max_eval_batches: 50
  notes: 0.1B LLaMA cosine 2.6B-token baseline on FineWeb sample-100BT
schedule:
  type: cosine
  warmup_steps: 200
  total_steps: 1250
  min_lr_ratio: 0.1
