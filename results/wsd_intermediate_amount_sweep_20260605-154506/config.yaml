run_name: wsd_intermediate_amount_sweep
owner: TBD
seed: 1
dataset:
  name: HuggingFaceFW/fineweb
  config_name: sample-100BT
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_from_train: true
  validation_stream_offset: 50000
  shuffle_buffer_size: 10000
  max_validation_samples: 5000
model:
  name: llama_intermediate_512x8
  context_length: 1024
  hidden_size: 512
  intermediate_size: 2048
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8
training:
  max_steps: 900
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 64
  learning_rate: 0.0006
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 5
  eval_interval_steps: 5
  save_interval_steps: 250
  max_eval_batches: 25
  notes: intermediate WSD decay amount sweep from step 900 with 100-step probe decay
  decay_amount_sweep:
    enabled: true
    probe_steps:
    - 900
    decay_length: 100
    probe_eval_interval_steps: 5
    final_lr_ratios:
    - 0.5
    - 0.3
    - 0.2
    - 0.1
    - 0.07
    - 0.05
    - 0.03
    - 0.02
    - 0.01
    decay_type: inverse_proportional
schedule:
  type: wsd_s
  warmup_steps: 100
  decay_type: inverse_proportional
  final_lr_ratio: 0.1
  decays:
  - start_step: 900
    end_step: 1000
