run_name: wsd_debug
owner: TBD
seed: 1

dataset:
  name: HuggingFaceFW/fineweb
  config_name: sample-10BT
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_from_train: true
  validation_stream_offset: 5000
  shuffle_buffer_size: 1000
  max_train_samples: 2048
  max_validation_samples: 256

model:
  name: small_llama_256x4
  context_length: 512
  hidden_size: 256
  intermediate_size: 1024
  num_hidden_layers: 4
  num_attention_heads: 4
  num_key_value_heads: 4

training:
  max_steps: 50
  batch_size: 2
  eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0003
  weight_decay: 0.1
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 1
  eval_interval_steps: 10
  save_interval_steps: 25
  max_eval_batches: 10
  notes: small WSD FineWeb debug baseline

schedule:
  type: wsd
  warmup_steps: 5
  stable_steps: 35
  decay_steps: 10
  final_lr_ratio: 0.1
