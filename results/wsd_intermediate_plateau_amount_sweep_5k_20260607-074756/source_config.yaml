run_name: wsd_intermediate_plateau_amount_sweep_5k
owner: TBD
seed: 1

dataset:
  name: HuggingFaceFW/fineweb
  config_name: sample-100BT
  tokenizer_name: gpt2
  text_column: text
  streaming: true
  train_split: train
  validation_from_train: true
  validation_stream_offset: 50000
  shuffle_buffer_size: 10000
  max_validation_samples: 5000

model:
  name: llama_intermediate_512x8
  context_length: 1024
  hidden_size: 512
  intermediate_size: 2048
  num_hidden_layers: 8
  num_attention_heads: 8
  num_key_value_heads: 8

training:
  max_steps: 5000
  batch_size: 8
  eval_batch_size: 8
  gradient_accumulation_steps: 64
  learning_rate: 6.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  max_grad_norm: 1.0
  mixed_precision: auto
  log_interval_steps: 5
  eval_interval_steps: 50
  save_interval_steps: 1000
  max_eval_batches: 25
  notes: plateau-region decay amount sweep 5k steps — probes every 500 steps from 2500 to 4500
  decay_amount_sweep:
    enabled: true
    probe_steps: [2500, 3000, 3500, 4000, 4500]
    decay_length: 500
    probe_eval_interval_steps: 50
    final_lr_ratios: [1.0, 0.5, 0.3, 0.2, 0.1, 0.03]
    decay_type: inverse_proportional

schedule:
  type: warmup_stable
  warmup_steps: 100
